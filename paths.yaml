# v_alpha_test paths configuration
# ===================================================================
# Edit this file to point at YOUR local copies of the model weights,
# the pulse-shape template, and the input data.
#
# Each `path:` entry can be:
#   - relative to the v_alpha_test repo root (e.g. "assets/avg_pulse.npy"),
#   - or absolute (e.g. "/global/.../checkpoint.pt", "~/models/x.pt").
#
# `path_candidates:` is a list — the first existing path wins.  Use this
# when you have several copies of an asset on disk.
#
# At pipeline startup the front stage validates every `required: true`
# asset.  If something is missing you'll get a clear error telling you
# exactly which path is missing and how to fix it.

# -------------------------------------------------------------------
# ML / template assets that the pipeline LOADS at runtime.

assets:

  # Attention-based perceiver: the "charge -> light" relation that drives
  # Phase 2 / Phase 3 placement scoring.  ~490 MB.  Not committed to git.
  # Download from the GitHub release (see `download` below) and drop at
  # the path below, OR change the path to wherever you keep it locally.
  perceiver_charge_light_relation:
    path: NewMLSection/runs/ndfull_run_distributed/checkpoint.pt
    sha256: 38655cca2b50f2caa643ef572fb80c77332611eafd3a831215cbe0f117473ac5
    required: true
    download:
      url: https://github.com/MadivB/CLMatching_AlphaRelease/releases/download/v0.1.0/checkpoint.pt
      command: |
        mkdir -p NewMLSection/runs/ndfull_run_distributed
        curl -L -o NewMLSection/runs/ndfull_run_distributed/checkpoint.pt \
          https://github.com/MadivB/CLMatching_AlphaRelease/releases/download/v0.1.0/checkpoint.pt

  # Per-tick PMT pulse-shape template (length 1000, float32).  Tiny (~4 KB)
  # and bundled in the repo at `assets/avg_pulse.npy`.
  pulse_template:
    path: assets/avg_pulse.npy
    sha256: cf52a851ab5d44f8b4804995fd8d5bcc662904a4fd9b96f62d3fb38dc8af6a7b
    required: true
    bundled: true

  # Per-channel light-waveform std predictor.  Optional -- if missing, the
  # front stage uses a constant-std proxy (allow_variance_fallback=True).
  variance_prediction:
    path_candidates:
      - NewMLSection/var_prediction/runs/var_run_perceiver_aligned_0001000_v2/best_model.pt
      - NewMLSection/var_prediction/runs/var_run_perceiver_aligned_0001000_v2/checkpoint.pt
    sha256: ""    # fill in once a release exists
    required: false
    download:
      url: ""    # not yet available; pipeline runs without it
      command: |
        # When a variance prediction release is published it'll appear at:
        #   https://github.com/MadivB/CLMatching_AlphaRelease/releases/...
        # Drop it at one of the path_candidates above and re-run.

  # ---------------- 2x2 detector assets ----------------
  # All four are SMALL (3.5-6 MB) and BUNDLED in-repo under TwoByTwo/, so the
  # 2x2 workflows are grab-and-run with no separate download.  The 2x2 worker
  # (TwoByTwo/run_2x2_worker.py) resolves them automatically from these in-repo
  # locations; you only need to touch these if you relocate the models.

  # 2x2 charge->light perceiver trained on SIMULATION (run_2x2_sim.sh).
  perceiver_2x2_sim:
    path: TwoByTwo/perceiver/runs/2x2_run/best_model.pt
    sha256: ffe910d5a3cce7c2828ca4146760f2619d6216f93f8ffae3c884667ce0b856fd
    required: true
    bundled: true

  # 2x2 charge->light perceiver trained on real DATA (run_2x2_data.sh).
  perceiver_2x2_data:
    path: TwoByTwo/perceiver/runs/2x2_data_run/best_model.pt
    sha256: 6f7a9eea30d57d043cf8c626e4fd5c601b32bd5fb6bd9ee9471ab8600c389acb
    required: true
    bundled: true

  # 2x2 PMT pulse-shape template (length 1000, float32).  Identical bytes to the
  # ND assets/avg_pulse.npy, kept here so TwoByTwo/ is self-contained.
  pulse_template_2x2:
    path: TwoByTwo/assets/avg_pulse_2x2.npy
    sha256: cf52a851ab5d44f8b4804995fd8d5bcc662904a4fd9b96f62d3fb38dc8af6a7b
    required: true
    bundled: true

  # 2x2 light-waveform variance predictor.  OPTIONAL: only the v2.0 algorithm
  # (region-grow + tiebreaker) uses it; v1.0 (default, error-matrix) does not.
  variance_2x2_prediction:
    path: TwoByTwo/var_model/var_model_2x2.pt
    sha256: b572c71f122a1f0bdde9c48e590760c12161ee57edf548c3b3ec8e49b971f2b8
    required: false
    bundled: true

# -------------------------------------------------------------------
# Default input data locations.  Override at the CLI with --files / FILE=.

input_data:
  default_data_dir: /global/cfs/cdirs/dunepro/people/abooth/nd-production/output/MiniProdN5/run-ndlar-flow/MiniProdN5p1_NDComplex_FHC.flow.full.sanddrift/FLOW/0000000
  # 2x2 simulation (MiniRun6.4) and real beam-data reflow folders.
  default_data_dir_2x2_sim: /global/cfs/cdirs/dune/www/data/2x2/simulation/productions/MiniRun6.4_1E19_RHC/MiniRun6.4_1E19_RHC.flow/FLOW/0000000
  default_data_dir_2x2_data: /global/cfs/cdirs/dune/www/data/2x2/reflows/v10/flow/beam/july10_2024/nominal_hv
